<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Concept</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: black;
    color: white;
    text-align: center;
}

/* LOGO */
.logo {
    width: 320px;
    margin-top: 20px;
}

/* TAGLINE */
.tagline {
    font-size: 16px;
    margin-top: 5px;
    opacity: 0.75;
}

/* SLIDER */
.slider {
    position: relative;
    max-width: 100%;
    height: 500px;
    margin-top: 30px;
    overflow: hidden;
}

.slides {
    display: flex;
    width: 700%;
    animation: slide 35s infinite;
}

.slides img {
    width: 100%;
    height: 500px;
    object-fit: cover;
}

/* CAPTION */
.caption {
    position: absolute;
    bottom: 15px;
    left: 0;
    width: 100%;
    font-size: 18px;
    font-weight: bold;
    background: rgba(0,0,0,0.3);
    padding: 8px 0;
}

/* CTA BUTTON */
.cta-btn {
    display: inline-block;
    margin: 40px 0;
    padding: 16px 40px;
    background: #25D366;
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-radius: 40px;
    font-size: 18px;
    transition: 0.3s ease;
}

.cta-btn:hover {
    background: #1ebe5d;
}

/* AUTO SLIDE */
@keyframes slide {
    0% {margin-left: 0%;}
    12% {margin-left: 0%;}
    14% {margin-left: -100%;}
    26% {margin-left: -100%;}
    28% {margin-left: -200%;}
    40% {margin-left: -200%;}
    42% {margin-left: -300%;}
    54% {margin-left: -300%;}
    56% {margin-left: -400%;}
    68% {margin-left: -400%;}
    70% {margin-left: -500%;}
    82% {margin-left: -500%;}
    84% {margin-left: -600%;}
    96% {margin-left: -600%;}
    100% {margin-left: 0%;}
}
</style>
</head>

<body>

<img src="logo.svg" alt="Premium Concept Logo" class="logo">

<div class="tagline">Where Premium Meets Fun</div>

<div class="slider">
    <div class="slides">
        <img src="event1.JPG" alt="Event 1">
        <img src="event2.JPG" alt="Event 2">
        <img src="event3.JPG" alt="Event 3">
        <img src="event4.JPG" alt="Event 4">
        <img src="event5.JPG" alt="Event 5">
        <img src="event6.JPG" alt="Event 6">
        <img src="event7.JPG" alt="Event 7">
    </div>

    <div class="caption">
        Premium Mascots | Labubu | Birthdays | Corporate | School Events | Brand Activations
    </div>
</div>

<a href="https://wa.me/2348132370407?text=Hello%20Premium%20Concept,%0A%0AI%20would%20like%20to%20make%20an%20enquiry.%20Kindly%20share:%0A%0A1.%20Available%20mascot%20or%20entertainment%20packages%0A2.%20Pricing%20details%0A3.%20Availability%20for%20my%20event%20date%0A4.%20Any%20additional%20service%20options%20(Labubu,%20brand%20activations,%20corporate,%20etc.)%0A%0AThank%20you." 
target="_blank" class="cta-btn">
BOOK US NOW
</a>

</body>
</html>
