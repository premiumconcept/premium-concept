<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Concept</title>

<style>
body {
    margin: 0;
    background-color: #000;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}

/* HERO SECTION */
.hero {
    padding: 80px 20px 40px;
}

.hero img {
    width: 280px;
    max-width: 90%;
}

.tagline {
    color: #d4af37;
    letter-spacing: 4px;
    margin-top: 20px;
    font-size: 14px;
}

/* SLIDESHOW */
.slideshow-container {
    max-width: 1000px;
    margin: 40px auto;
    position: relative;
}

.slide {
    display: none;
}

.slide img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    border-radius: 12px;
}

/* FADE ANIMATION */
.fade {
    animation: fadeEffect 1.5s;
}

@keyframes fadeEffect {
    from { opacity: 0.4; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <img src="logo.svg" alt="Premium Concept Logo">
    <div class="tagline">ELEVATING EXCELLENCE</div>
</div>

<!-- SLIDESHOW -->
<div class="slideshow-container">

    <div class="slide fade">
        <img src="event1.JPG" alt="Event 1">
    </div>

    <div class="slide fade">
        <img src="event2.JPG" alt="Event 2">
    </div>

    <div class="slide fade">
        <img src="event3.JPG" alt="Event 3">
    </div>

    <div class="slide fade">
        <img src="event4.JPG" alt="Event 4">
    </div>

    <div class="slide fade">
        <img src="event5.JPG" alt="Event 5">
    </div>

    <div class="slide fade">
        <img src="event6.JPG" alt="Event 6">
    </div>

    <div class="slide fade">
        <img src="event7.JPG" alt="Event 7">
    </div>

</div>

<script>
let slideIndex = 0;
showSlides();

function showSlides() {
    let slides = document.getElementsByClassName("slide");

    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }

    slideIndex++;

    if (slideIndex > slides.length) {
        slideIndex = 1;
    }

    slides[slideIndex - 1].style.display = "block";

    setTimeout(showSlides, 3000);
}
</script>

</body>
</html>
